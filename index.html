<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Битва за Африку | Arma 3 Milsim</title>
    <style>
        /* Общие настройки */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            height: 100%;
            background-color: #0d0d0d;
            color: #fff;
            overflow-x: hidden;
        }

        /* Задний фон с фиксацией размеров */
        .hero-section {
            position: relative;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-color: #0d0d0d;
        }

        /* Слой для фоновых картинок с плавным переходом */
        .bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background-position: center center;
            background-size: cover;
            background-repeat: no-repeat;
            /* Плавность затухания и появления в 1.5 секунды */
            transition: background-image 1.5s ease-in-out; 
        }

        /* Контейнер с текстом и кнопками */
        .content {
            max-width: 800px;
            padding: 20px;
            z-index: 2; /* Текст строго поверх фона */
        }

        /* Военный шеврон/плашка сверху */
        .badge {
            display: inline-block;
            padding: 6px 16px;
            background-color: #d35400; 
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 2px;
            margin-bottom: 20px;
            border-radius: 3px;
        }

        /* Главный заголовок */
        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
            color: #ffffff;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
        }

        /* Подзаголовок */
        .subtitle {
            font-size: 1.5rem;
            color: #bdc3c7;
            margin-bottom: 40px;
            font-weight: 400;
            letter-spacing: 1px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
        }

        /* Блок с кнопками */
        .btn-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Общие стили для кнопок */
        .btn {
            display: inline-block;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            text-decoration: none;
            letter-spacing: 1px;
            border-radius: 4px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        /* Кнопка Дискорда */
        .btn-discord {
            background-color: #5865F2;
            color: #fff;
            border: 2px solid #5865F2;
        }

        .btn-discord:hover {
            background-color: #4351df;
            border-color: #4351df;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(88, 101, 242, 0.4);
        }

        /* Кнопка для сборки модов */
        .btn-modpack {
            background-color: transparent;
            color: #e67e22;
            border: 2px solid #e67e22;
        }

        .btn-modpack:hover {
            background-color: #e67e22;
            color: #000;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(230, 126, 34, 0.4);
        }

        /* Адаптивность для мобилок */
        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            .subtitle { font-size: 1.1rem; }
            .btn { width: 100%; text-align: center; }
            .btn-container { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <!-- Отдельный слой для фонов с наложенным затемнением -->
        <div class="bg-layer" id="bgLayer"></div>

        <div class="content">
            <div class="badge">Arma 3 Milsim Project</div>
            <h1>Битва за Африку</h1>
            <p class="subtitle">Тактический симулятор операций ЧВК «Вагнер» в условиях африканского театра военных действий.</p>
            
            <div class="btn-container">
                <a href="#" target="_blank" class="btn btn-discord">Присоединиться к Discord</a>
                <a href="#" target="_blank" class="btn btn-modpack">Скачать сборку модов</a>
            </div>
        </div>
    </section>

    <!-- Скрипт для автоматической смены картинок -->
    <script>
        // Список твоих картинок. Сюда потом можно дописывать 'background3.jpg' и т.д.
        const images = [
            'background.jpg',
            'background2.jpg'
        ];

        let currentIndex = 0;
        const bgLayer = document.getElementById('bgLayer');

        function changeBackground() {
            // Берем текущую картинку из списка
            const nextImage = images[currentIndex];
            
            // Меняем фон и сохраняем наше брутальное затемнение поверх неё
            bgLayer.style.backgroundImage = `linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.85)), url('${nextImage}')`;
            
            // Переходим к следующему индексу, а если дошли до конца — возвращаемся к первой
            currentIndex = (currentIndex + 1) % images.length;
        }

        // Запускаем первую картинку сразу при загрузке
        changeBackground();

        // Ставим таймер переключения: 5000 миллисекунд = 5 секунд
        setInterval(changeBackground, 5000);
    </script>

</body>
</html>
