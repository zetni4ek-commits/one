<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Битва за Африку | Arma 3 Milsim</title>
    <style>
        /* Общие настройки */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            height: 100%;
            background-color: #0d0d0d;
            color: #fff;
            overflow-x: hidden;
        }

        /* Задний фон с фиксацией размеров */
        .hero-section {
            position: relative;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-color: #0d0d0d;
        }

        /* Общие стили для слоев картинок */
        .bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-position: center center;
            background-size: cover;
            background-repeat: no-repeat;
            /* Анимация проявления/затухания за 2 секунды */
            transition: opacity 2s ease-in-out; 
        }

        /* Первый слой (активный по умолчанию) */
        #bg1 {
            z-index: 1;
            opacity: 1;
        }

        /* Второй слой (скрытый по умолчанию) */
        #bg2 {
            z-index: 2;
            opacity: 0;
        }

        /* Затемняющий фильтр поверх всех картинок, чтобы текст читался */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.85));
            z-index: 3;
        }

        /* Контейнер с текстом и кнопками */
        .content {
            max-width: 800px;
            padding: 20px;
            z-index: 4; /* Текст строго поверх всех фильтров */
        }

        /* Военный шеврон/плашка сверху */
        .badge {
            display: inline-block;
            padding: 6px 16px;
            background-color: #d35400; 
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 2px;
            margin-bottom: 20px;
            border-radius: 3px;
        }

        /* Главный заголовок */
        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
            color: #ffffff;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
        }

        /* Подзаголовок */
        .subtitle {
            font-size: 1.5rem;
            color: #bdc3c7;
            margin-bottom: 40px;
            font-weight: 400;
            letter-spacing: 1px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
        }

        /* Блок с кнопками */
        .btn-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Общие стили для кнопок */
        .btn {
            display: inline-block;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            text-decoration: none;
            letter-spacing: 1px;
            border-radius: 4px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        /* Кнопка Дискорда */
        .btn-discord {
            background-color: #5865F2;
            color: #fff;
            border: 2px solid #5865F2;
        }

        .btn-discord:hover {
            background-color: #4351df;
            border-color: #4351df;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(88, 101, 242, 0.4);
        }

        /* Кнопка для сборки модов */
        .btn-modpack {
            background-color: transparent;
            color: #e67e22;
            border: 2px solid #e67e22;
        }

        .btn-modpack:hover {
            background-color: #e67e22;
            color: #000;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(230, 126, 34, 0.4);
        }

        /* Адаптивность для мобилок */
        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            .subtitle { font-size: 1.1rem; }
            .btn { width: 100%; text-align: center; }
            .btn-container { flex-direction: column; gap: 15px; }
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <div class="bg-layer" id="bg1"></div>
        <div class="bg-layer" id="bg2"></div>
        
        <div class="overlay"></div>

        <div class="content">
            <div class="badge">Arma 3 Milsim Project</div>
            <h1>Битва за Африку</h1>
            <p class="subtitle">Тактический симулятор операций ЧВК «Вагнер» в условиях африканского театра военных действий.</p>
            
            <div class="btn-container">
                <a href="#" target="_blank" class="btn btn-discord">Присоединиться к Discord</a>
                <a href="#" target="_blank" class="btn btn-modpack">Скачать сборку модов</a>
            </div>
        </div>
    </section>

    <script>
        // Твои файлы картинок из репозитория
        const images = [
            'background.jpg',
            'background2.jpg'
        ];

        let currentIndex = 0;
        const bg1 = document.getElementById('bg1');
        const bg2 = document.getElementById('bg2');
        
        // Переменная, которая следит, какой слой сейчас сверху
        let isFirstLayerActive = true;

        // Ставим самую первую картинку сразу на первый слой
        bg1.style.backgroundImage = `url('${images[0]}')`;

        function changeBackground() {
            // Переходим к индексу следующей картинки
            currentIndex = (currentIndex + 1) % images.length;
            const nextImage = images[currentIndex];

            if (isFirstLayerActive) {
                // Если активен первый слой, то плавно переключаемся на второй
                bg2.style.backgroundImage = `url('${nextImage}')`;
                bg2.style.opacity = 1;
                bg1.style.opacity = 0;
            } else {
                // Если активен второй слой, плавно возвращаемся на первый
                bg1.style.backgroundImage = `url('${nextImage}')`;
                bg1.style.opacity = 1;
                bg2.style.opacity = 0;
            }

            // Меняем флаг активности слоя на противоположный
            isFirstLayerActive = !isFirstLayerActive;
        }

        // Запускаем таймер переключения каждые 5 секунд (5000 миллисекунд)
        setInterval(changeBackground, 5000);
    </script>

</body>
</html>
